apiVersion: v1
kind: Namespace
metadata:
  name: dev

---
# If you don’t specify resources in Deployment
# each pod gets this limit individually
apiVersion: v1
kind: LimitRange
metadata:
  name: dev-limits
  namespace: dev
spec:
  limits:
  - type: Container
    defaultRequest:
      cpu: "250m"
      memory: "128Mi"
    default:
      cpu: "500m"
      memory: "256Mi"

---
apiVersion: v1
kind: ResourceQuota
metadata:
  name: dev-quota
  namespace: dev
spec:
  hard:
    # All pods together in dev namespace cannot exceed:
    requests.cpu: "1250m"
    requests.memory: "320Mi"
    limits.cpu: "2500m"
    limits.memory: "640Mi"
