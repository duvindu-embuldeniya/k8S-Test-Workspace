apiVersion: v1
kind: Service
metadata:
  name: django-svc
  labels:
    app: django-svc    # This will show Services with label app=nginx-svc
                      # kubectl get svc -l app=nginx-svc
spec:
  type: NodePort
  ports:              
    - port: 8000        # port on which the Service listens for incoming traffic.
      protocol: TCP
      targetPort: 8000  # where traffic should re-direct
      # nodePort: 30007 #dont need as we do port forwarding
  selector: 
    app: django-app        # service gonna looks pods have this label


#kubectl port-forward service/django-svc 8000:8000
#http://localhost:8000