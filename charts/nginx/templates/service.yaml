{{ if .Values.service.enable }}
apiVersion: v1
kind: Service
metadata:
  name: {{ .Release.Name }}-{{ .Chart.Name }}-svc      
spec:
  type: {{ .Values.service.type}}            
  selector:
    app: nginx              
  ports:
    - protocol: TCP
      port: {{ .Values.service.port }}              
      targetPort: {{ .Values.service.port }}         
{{ end }}