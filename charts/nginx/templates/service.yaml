
{{ if .Values.service.enabled }}

apiVersion: v1
kind: Service 
metadata:
  name: {{ .Release.Name}}-{{ .Chart.Name }}-svc
  labels:
    app: {{ .Chart.Name }}
    release: {{ .Release.Name }}
spec:
  type: {{ .Values.service.type }}
  ports:              
    - port: {{ .Values.service.port }}       
      protocol: TCP
      targetPort: {{ .Values.service.targetPort }} 
  selector: 
    app: {{ .Chart.Name }}
    release: {{ .Release.Name }}       

{{ end }} 