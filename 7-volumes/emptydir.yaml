apiVersion: v1
kind: Pod
metadata:
  name: emptydir-share-demo  # Name of the Pod
spec:
  volumes:
    - name: shared-storage   # Shared volume name
      emptyDir: {}           # Temporary storage (deleted when Pod is deleted)

  containers:
    - name: writer           # First container (writes data)
      image: duvindune/repo11:v1.0
      volumeMounts:
        - name: shared-storage
          mountPath: /duvindu   # Writer writes data here

    - name: reader           # Second container (now nginx)
      image: nginx:latest
      volumeMounts:
        - name: shared-storage  # Mount the same shared volume
          mountPath: /usr/share/nginx/html      # nginx serves from here



