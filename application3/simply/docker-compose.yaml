version: "3.9"

services:
  db:
    image: postgres:14-alpine
    container_name: postgres_container
    environment:
      POSTGRES_USER: ${DB_USER}
      POSTGRES_PASSWORD: ${DB_PASS}
      POSTGRES_DB: ${DB_NAME}
    volumes:
      - dev-db-data:/var/lib/postgresql/data
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${DB_USER}"]
      interval: 5s
      timeout: 5s
      retries: 10
    restart: unless-stopped

  backend:
    build: .
    image: backend:django
    container_name: django_container
    ports:
      - "8000:8000"
    environment:
      DB_HOST: db
      DB_NAME: ${DB_NAME}
      DB_USER: ${DB_USER}
      DB_PASS: ${DB_PASS}
      DB_PORT: 5432
      PYTHONUNBUFFERED: 1
    depends_on:
      db:
        condition: service_healthy

    command: >
      sh -c "
      python manage.py makemigrations --noinput &&
      python manage.py migrate --noinput &&
      gunicorn simply.wsgi:application --bind 0.0.0.0:8000 --workers 3 --timeout 60
      "

    healthcheck:
      test: ["CMD-SHELL", "curl -f http://localhost:8000/health/ || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 10

    restart: unless-stopped

volumes:
  dev-db-data:


# dev-db-data → Docker storage (volume)
# /var/lib/postgresql/data → folder inside Postgres where DB lives

