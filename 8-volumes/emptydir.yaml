apiVersion: v1
kind: Pod
metadata:
  name: emptydir-share-demo  # Name of the Pod
spec:
  volumes:
    - name: shared-storage   # Shared volume name
      emptyDir: {}           # Temporary storage (deleted when Pod is deleted)
  containers:
    - name: writer           # First container (writes data)
      image: duvindune/repo1:v1
      volumeMounts:
        - name: shared-storage
          mountPath: /data1   # Writer writes data here
    - name: reader           # Second container (reads data)
      image: duvindune/repo2:v1
      volumeMounts:
        - name: shared-storage  # Mount the same shared volume
          mountPath: /duvindu/niduvara      # Reader reads data from here



